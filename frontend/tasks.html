<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mind Mate - Task Management</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23102219' rx='20' width='100' height='100'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='48' font-weight='bold' fill='%2313ec80' font-family='sans-serif'%3EM%3C/text%3E%3C/svg%3E">
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<!-- Tailwind Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                        "surface-dark": "#1a2c24", 
                        "surface-dark-hover": "#22382e",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem", 
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<!-- External Stylesheet -->
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display h-screen overflow-hidden flex selection:bg-primary selection:text-black">
<a href="#main-content" class="mm-skip-link">Skip to main content</a>
<!-- Mobile Header -->
<div class="md:hidden flex items-center justify-between p-4 bg-[#0d1b14] border-b border-white/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">school</span>
<span class="font-bold text-lg">Mind Mate</span>
</div>
<button aria-label="Open menu" class="text-gray-400 hover:text-white">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
<!-- Sidebar -->
<div id="nav-sidebar"></div>
<!-- Main Content -->
<main id="main-content" role="main" aria-label="Task Management" class="flex-1 flex flex-col h-full overflow-hidden relative">
<!-- Top Bar / Header -->
<header class="pt-8 px-8 pb-4 shrink-0 flex justify-between items-end">
<div class="flex flex-col gap-1">
<p id="current-date" class="text-[#9db9ab] text-sm font-medium tracking-wide uppercase"></p>
<h1 class="text-white text-4xl font-black leading-tight tracking-[-0.033em]">My Tasks</h1>
</div>
<div class="flex gap-4">
<!-- Search -->
<div class="relative hidden lg:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#9db9ab]">search</span>
<input aria-label="Search tasks" class="bg-surface-dark border-none rounded-lg text-white pl-10 pr-4 py-2.5 w-64 focus:ring-2 focus:ring-primary focus:outline-none placeholder-[#5a7065] text-sm" placeholder="Search tasks..." type="text"/>
</div>
<!-- Add Button (Mobile/Tablet visible, Desktop secondary) -->
<button id="new-task-btn" class="bg-primary hover:bg-[#0fd671] text-black font-bold py-2.5 px-6 rounded-lg flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
<span>New Task</span>
</button>
</div>
</header>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-8 pb-12">
<!-- Dashboard Widgets Row -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 mt-4">
<!-- Stats Cards -->
<div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-3 gap-4 mm-stagger">
<div class="flex flex-col justify-between rounded-2xl p-6 bg-surface-dark border border-white/5 relative overflow-hidden group hover:border-primary/30 transition-colors">
<div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl text-white">calendar_today</span>
</div>
<p class="text-[#9db9ab] text-sm font-medium leading-normal z-10">Due Today</p>
<div class="flex items-baseline gap-2 z-10 mt-2">
<p id="stat-due-today" class="text-white text-3xl font-bold leading-tight">—</p>
</div>
</div>
<div class="flex flex-col justify-between rounded-2xl p-6 bg-surface-dark border border-white/5 relative overflow-hidden group hover:border-primary/30 transition-colors">
<div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
</div>
<p class="text-[#9db9ab] text-sm font-medium leading-normal z-10">Completed</p>
<div class="flex items-baseline gap-2 z-10 mt-2">
<p id="stat-completed" class="text-white text-3xl font-bold leading-tight">—</p>
</div>
</div>
<div class="flex flex-col justify-between rounded-2xl p-6 bg-surface-dark border border-white/5 relative overflow-hidden group hover:border-primary/30 transition-colors">
<div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl text-white">hourglass_empty</span>
      </div>
<p class="text-[#9db9ab] text-sm font-medium leading-normal z-10">Pending</p>
<div class="flex items-baseline gap-2 z-10 mt-2">
<p id="stat-pending" class="text-white text-3xl font-bold leading-tight">—</p>
</div>
</div>
</div>
<!-- Daily Progress -->
<div class="lg:col-span-4 rounded-2xl p-6 bg-gradient-to-br from-surface-dark to-[#13201a] border border-white/5 flex flex-col justify-center">
<div class="flex justify-between items-end mb-3">
<div>
<p class="text-white text-lg font-bold">Daily Goal</p>
<p class="text-[#9db9ab] text-xs">Stay consistent!</p>
</div>
<span id="progress-pct" class="text-primary text-2xl font-black">0%</span>
</div>
<div class="w-full bg-[#3b5447] rounded-full h-3 mb-2">
<div id="progress-bar" class="bg-primary h-3 rounded-full transition-all duration-500 ease-out shadow-[0_0_10px_rgba(19,236,128,0.4)]" style="width: 0%"></div>
</div>
<p id="progress-txt" class="text-[#9db9ab] text-xs font-normal text-right">0/0 tasks completed</p>
</div>
</div>
<!-- Quick Add Bar -->
<div class="bg-surface-dark rounded-2xl p-2 mb-8 flex items-center shadow-lg border border-white/5 focus-within:border-primary/50 transition-colors group">
<button aria-label="Add task" class="p-3 text-primary hover:bg-primary/10 rounded-xl transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</button>
<input id="quick-task-input" class="bg-transparent border-none text-white w-full focus:ring-0 placeholder-[#5a7065] text-lg font-medium px-2" placeholder="I need to..." type="text"/>
<div class="hidden md:flex items-center gap-2 pr-2">
<button id="quick-date-btn" aria-label="Set due date" class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-[#283930] hover:bg-[#32473c] text-[#9db9ab] text-xs font-medium transition-colors">
<span class="material-symbols-outlined text-[16px]">calendar_month</span>
<span>Today</span>
</button>
<button id="quick-tag-btn" aria-label="Add tag" class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-[#283930] hover:bg-[#32473c] text-[#9db9ab] text-xs font-medium transition-colors">
<span class="material-symbols-outlined text-[16px]">sell</span>
<span>Tag</span>
</button>
<button id="quick-priority-btn" aria-label="Set priority" class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-[#283930] hover:bg-[#32473c] text-[#9db9ab] text-xs font-medium transition-colors">
<span class="material-symbols-outlined text-[16px]">flag</span>
<span>Priority</span>
</button>
<button id="quick-add-btn" class="bg-primary/20 text-primary hover:bg-primary hover:text-black font-bold px-4 py-1.5 rounded-lg text-sm transition-all ml-2">
                        Enter
                    </button>
</div>
</div>
<!-- Filter Chips -->
<div id="filter-bar" class="flex flex-wrap gap-3 mb-6">
<button data-filter="all" class="filter-chip flex h-9 items-center justify-center gap-x-2 rounded-full bg-primary text-black px-5 transition-transform hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(19,236,128,0.3)]">
<p class="text-sm font-bold leading-normal">All Tasks</p>
</button>
<button data-filter="today" class="filter-chip flex h-9 items-center justify-center gap-x-2 rounded-full bg-surface-dark border border-white/5 hover:border-primary/30 hover:bg-surface-dark-hover px-5 transition-colors">
<p class="text-white text-sm font-medium leading-normal">Today</p>
<span class="filter-badge bg-white/10 text-white text-[10px] px-1.5 py-0.5 rounded-full hidden"></span>
</button>
<button data-filter="upcoming" class="filter-chip flex h-9 items-center justify-center gap-x-2 rounded-full bg-surface-dark border border-white/5 hover:border-primary/30 hover:bg-surface-dark-hover px-5 transition-colors">
<p class="text-white text-sm font-medium leading-normal">Upcoming</p>
</button>
<button data-filter="overdue" class="filter-chip flex h-9 items-center justify-center gap-x-2 rounded-full bg-surface-dark border border-white/5 hover:border-primary/30 hover:bg-surface-dark-hover px-5 transition-colors">
<p class="text-white text-sm font-medium leading-normal">Overdue</p>
<span class="filter-badge bg-red-500/20 text-red-400 text-[10px] px-1.5 py-0.5 rounded-full hidden"></span>
</button>
</div>
<!-- Task List (populated dynamically) -->
<div id="task-list" class="flex flex-col gap-3"></div>
</div>
</main>

<script type="module">
  import { authGuard } from "./js/services/auth.service.js";
  import { listenToUserData, pushUserData, updateUserData, removeUserData, getUserData } from "./js/services/db.service.js";
  import { showToast, showConfirm, showPrompt } from "./js/services/toast.js";
  import { validateTaskTitle } from "./js/services/validators.js";
  import { initNav } from "./js/services/nav.js";

  await authGuard();
  initNav("tasks");

  // Dynamic date display
  const dateEl = document.getElementById("current-date");
  if (dateEl) {
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  }

  const taskList = document.getElementById("task-list");
  const dueTodayEl  = document.getElementById("stat-due-today");
  const completedEl = document.getElementById("stat-completed");
  const pendingEl   = document.getElementById("stat-pending");
  const progressBar = document.getElementById("progress-bar");
  const progressPct = document.getElementById("progress-pct");
  const progressTxt = document.getElementById("progress-txt");

  const PRIORITY = {
    high:   { bg: "bg-red-500/10",    border: "border-red-500/10",    dot: "bg-red-500",    text: "text-red-400" },
    medium: { bg: "bg-yellow-500/10", border: "border-yellow-500/10", dot: "bg-yellow-500", text: "text-yellow-400" },
    low:    { bg: "bg-gray-500/10",   border: "border-gray-500/10",   dot: "bg-gray-400",   text: "text-gray-400" }
  };

  function _esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

  function renderTask(taskId, task) {
    const priority = task.priority || "medium";
    const color = PRIORITY[priority] || PRIORITY.medium;
    const div = document.createElement("div");
    div.dataset.taskId = taskId;
    div.className = "group flex flex-col md:flex-row md:items-center gap-4 p-4 rounded-xl bg-surface-dark border border-white/5 hover:border-primary/40 hover:bg-surface-dark-hover transition-all cursor-pointer shadow-sm";
    div.innerHTML = `
      <div class="flex items-center gap-4 flex-1">
        <button aria-label="Toggle complete" class="relative flex items-center justify-center w-6 h-6 rounded-full border-2 ${task.completed ? 'border-primary bg-primary' : 'border-[#9db9ab]'} cursor-pointer shrink-0" data-toggle="${taskId}">
          ${task.completed ? '<span class="material-symbols-outlined text-black text-lg font-bold">check</span>' : ''}
        </button>
        <div class="flex flex-col">
          <h3 class="${task.completed ? 'text-[#9db9ab] line-through' : 'text-white'} text-lg font-medium group-hover:text-primary transition-colors">${_esc(task.title || "Untitled Task")}</h3>
          <div class="flex items-center gap-2 mt-1 flex-wrap">
            <span class="text-[#9db9ab] text-xs flex items-center gap-1">
              <span class="material-symbols-outlined text-[14px]">schedule</span>
              ${task.dueDate ? new Date(task.dueDate).toLocaleDateString() : "No date"}
            </span>
            ${task.tag ? `<span class="text-primary/70 text-xs flex items-center gap-1 bg-primary/10 px-2 py-0.5 rounded-full"><span class="material-symbols-outlined text-[12px]">sell</span>${_esc(task.tag)}</span>` : ""}
          </div>
        </div>
      </div>
      <div class="flex items-center justify-between md:justify-end gap-4 pl-10 md:pl-0">
        <div class="flex items-center gap-2 ${color.bg} px-3 py-1 rounded-full border ${color.border}">
          <div class="w-2 h-2 rounded-full ${color.dot}"></div>
          <span class="text-xs ${color.text} font-medium">${priority.charAt(0).toUpperCase() + priority.slice(1)}</span>
        </div>
        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
          <button aria-label="Edit task" class="p-2 text-[#9db9ab] hover:text-white hover:bg-white/10 rounded-lg" data-edit="${taskId}">
            <span class="material-symbols-outlined text-[20px]">edit</span>
          </button>
          <button aria-label="Delete task" class="p-2 text-[#9db9ab] hover:text-red-400 hover:bg-red-500/10 rounded-lg" data-delete="${taskId}">
            <span class="material-symbols-outlined text-[20px]">delete</span>
          </button>
        </div>
      </div>`;
    return div;
  }

  // ── Filter & search state ──
  let allTasks = [];
  let activeFilter = "all";
  const searchInput = document.querySelector("input[aria-label='Search tasks']");
  const filterChips = document.querySelectorAll(".filter-chip");
  const ACTIVE_CLS = ["bg-primary", "text-black", "shadow-[0_0_15px_rgba(19,236,128,0.3)]"];
  const INACTIVE_CLS = ["bg-surface-dark", "border", "border-white/5", "hover:border-primary/30", "hover:bg-surface-dark-hover"];

  function applyFilter() {
    if (!taskList) return;
    const query = (searchInput?.value || "").toLowerCase().trim();
    const today = new Date().toDateString();
    const now = new Date();

    let filtered = allTasks;

    // Apply filter
    if (activeFilter === "today") {
      filtered = filtered.filter(([, t]) => !t.completed && t.dueDate && new Date(t.dueDate).toDateString() === today);
    } else if (activeFilter === "upcoming") {
      filtered = filtered.filter(([, t]) => !t.completed && t.dueDate && new Date(t.dueDate) > now);
    } else if (activeFilter === "overdue") {
      filtered = filtered.filter(([, t]) => !t.completed && t.dueDate && new Date(t.dueDate) < now && new Date(t.dueDate).toDateString() !== today);
    }

    // Apply search
    if (query) {
      filtered = filtered.filter(([, t]) => (t.title || "").toLowerCase().includes(query));
    }

    taskList.innerHTML = "";
    if (filtered.length === 0) {
      taskList.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-center opacity-50">
        <span class="material-symbols-outlined text-5xl text-primary mb-3">${allTasks.length === 0 ? "spa" : "search_off"}</span>
        <p class="text-white text-lg font-medium">${allTasks.length === 0 ? "All caught up!" : "No matching tasks"}</p>
        <p class="text-[#9db9ab] text-sm mt-1">${allTasks.length === 0 ? "Add a task to get started." : "Try a different filter or search term."}</p>
      </div>`;
    } else {
      filtered.forEach(([id, task]) => taskList.appendChild(renderTask(id, task)));
    }
  }

  // Filter chip click handlers
  filterChips.forEach(chip => {
    chip.addEventListener("click", () => {
      activeFilter = chip.dataset.filter;
      filterChips.forEach(c => {
        c.classList.remove(...ACTIVE_CLS);
        c.classList.add(...INACTIVE_CLS);
        c.querySelector("p").classList.remove("text-black", "font-bold");
        c.querySelector("p").classList.add("text-white", "font-medium");
      });
      chip.classList.remove(...INACTIVE_CLS);
      chip.classList.add(...ACTIVE_CLS);
      chip.querySelector("p").classList.remove("text-white", "font-medium");
      chip.querySelector("p").classList.add("text-black", "font-bold");
      applyFilter();
    });
  });

  // Search input handler
  searchInput?.addEventListener("input", () => applyFilter());

  listenToUserData("tasks", snap => {
    if (!taskList) return;
    allTasks = Object.entries(snap || {});

    // Update stats
    const today = new Date().toDateString();
    const now = new Date();
    const total     = allTasks.length;
    const completed = allTasks.filter(([, t]) => t.completed).length;
    const dueToday  = allTasks.filter(([, t]) => !t.completed && t.dueDate && new Date(t.dueDate).toDateString() === today).length;
    const overdue   = allTasks.filter(([, t]) => !t.completed && t.dueDate && new Date(t.dueDate) < now && new Date(t.dueDate).toDateString() !== today).length;
    const progress  = total > 0 ? Math.round((completed / total) * 100) : 0;

    if (dueTodayEl)  dueTodayEl.textContent  = dueToday;
    if (completedEl) completedEl.textContent = completed;
    if (pendingEl)   pendingEl.textContent   = total - completed;

    // Daily goal: based on today's tasks (due today + completed today)
    const todayTasks = allTasks.filter(([, t]) => t.dueDate && new Date(t.dueDate).toDateString() === today);
    const todayCompleted = todayTasks.filter(([, t]) => t.completed).length;
    const todayTotal = todayTasks.length;
    const dailyProgress = todayTotal > 0 ? Math.round((todayCompleted / todayTotal) * 100) : (completed > 0 ? 100 : 0);
    if (progressBar) progressBar.style.width = dailyProgress + "%";
    if (progressPct) progressPct.textContent = dailyProgress + "%";
    if (progressTxt) progressTxt.textContent = todayTotal > 0
      ? `${todayCompleted}/${todayTotal} today's tasks done`
      : `${completed}/${total} tasks completed`;

    // Update filter badge counts
    const todayBadge = document.querySelector("[data-filter='today'] .filter-badge");
    const overdueBadge = document.querySelector("[data-filter='overdue'] .filter-badge");
    if (todayBadge) {
      todayBadge.textContent = dueToday;
      todayBadge.classList.toggle("hidden", dueToday === 0);
    }
    if (overdueBadge) {
      overdueBadge.textContent = overdue;
      overdueBadge.classList.toggle("hidden", overdue === 0);
    }

    applyFilter();
  });

  // Delegated click handlers
  taskList?.addEventListener("click", async e => {
    const toggleId = e.target.closest("[data-toggle]")?.dataset.toggle;
    const editId   = e.target.closest("[data-edit]")?.dataset.edit;
    const deleteId = e.target.closest("[data-delete]")?.dataset.delete;

    if (toggleId) {
      const task = await getUserData(`tasks/${toggleId}`);
      if (task) await updateUserData(`tasks/${toggleId}`, { completed: !task.completed });
    }
    if (editId) {
      const task = await getUserData(`tasks/${editId}`);
      if (!task) return;
      const newTitle = await showPrompt("Edit task title:", task.title || "");
      if (newTitle === null || newTitle === task.title) return;
      const v = validateTaskTitle(newTitle);
      if (!v.valid) { showToast(v.error, "warning"); return; }
      await updateUserData(`tasks/${editId}`, { title: newTitle.trim() });
      showToast("Task updated", "success");
    }
    if (deleteId) {
      const ok = await showConfirm("Delete this task?");
      if (ok) { await removeUserData(`tasks/${deleteId}`); showToast("Task deleted", "info"); }
    }
  });

  // ── Quick-add toolbar state ──
  let quickDate = null;
  let quickPriority = "medium";
  let quickTag = "";

  const quickDateBtn     = document.getElementById("quick-date-btn");
  const quickTagBtn      = document.getElementById("quick-tag-btn");
  const quickPriorityBtn = document.getElementById("quick-priority-btn");

  // Date button — first click sets today, click again to change/clear
  // Hidden date input for native picker
  const _hiddenDate = document.createElement("input");
  _hiddenDate.type = "date";
  _hiddenDate.className = "sr-only";
  _hiddenDate.style.cssText = "position:absolute;opacity:0;pointer-events:none;width:0;height:0";
  document.body.appendChild(_hiddenDate);
  _hiddenDate.addEventListener("change", () => {
    quickDate = _hiddenDate.value || null;
    _updateDateBtn();
  });

  quickDateBtn?.addEventListener("click", () => {
    if (!quickDate) {
      quickDate = new Date().toISOString().split("T")[0];
      _updateDateBtn();
    } else {
      _hiddenDate.value = quickDate;
      _hiddenDate.showPicker?.();
    }
  });

  function _updateDateBtn() {
    if (!quickDateBtn) return;
    const label = quickDateBtn.querySelector("span:last-child");
    if (quickDate) {
      const d = new Date(quickDate + "T00:00:00");
      const today = new Date();
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
      let text;
      if (d.toDateString() === today.toDateString()) text = "Today";
      else if (d.toDateString() === tomorrow.toDateString()) text = "Tomorrow";
      else text = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      label.textContent = text;
      quickDateBtn.classList.remove("bg-[#283930]", "text-[#9db9ab]");
      quickDateBtn.classList.add("bg-primary/20", "text-primary");
    } else {
      label.textContent = "Today";
      quickDateBtn.classList.remove("bg-primary/20", "text-primary");
      quickDateBtn.classList.add("bg-[#283930]", "text-[#9db9ab]");
    }
  }

  // Priority button — cycles high → medium → low
  const PRIO_CYCLE = ["medium", "high", "low"];
  const PRIO_LABEL = { high: "High", medium: "Medium", low: "Low" };
  const PRIO_STYLE = {
    high:   ["bg-red-500/20", "text-red-400"],
    medium: ["bg-[#283930]", "text-[#9db9ab]"],
    low:    ["bg-gray-500/20", "text-gray-400"]
  };
  const ALL_PRIO_CLS = Object.values(PRIO_STYLE).flat();

  quickPriorityBtn?.addEventListener("click", () => {
    const idx = PRIO_CYCLE.indexOf(quickPriority);
    quickPriority = PRIO_CYCLE[(idx + 1) % PRIO_CYCLE.length];
    _updatePriorityBtn();
  });

  function _updatePriorityBtn() {
    if (!quickPriorityBtn) return;
    const label = quickPriorityBtn.querySelector("span:last-child");
    label.textContent = PRIO_LABEL[quickPriority];
    quickPriorityBtn.classList.remove(...ALL_PRIO_CLS);
    quickPriorityBtn.classList.add(...PRIO_STYLE[quickPriority]);
  }

  // Tag button — prompt for tag text
  quickTagBtn?.addEventListener("click", async () => {
    const tag = await showPrompt("Enter tag (e.g., homework, exam, project):", quickTag);
    if (tag === null) return;
    quickTag = tag.trim();
    _updateTagBtn();
  });

  function _updateTagBtn() {
    if (!quickTagBtn) return;
    const label = quickTagBtn.querySelector("span:last-child");
    if (quickTag) {
      label.textContent = quickTag;
      quickTagBtn.classList.remove("bg-[#283930]", "text-[#9db9ab]");
      quickTagBtn.classList.add("bg-primary/20", "text-primary");
    } else {
      label.textContent = "Tag";
      quickTagBtn.classList.remove("bg-primary/20", "text-primary");
      quickTagBtn.classList.add("bg-[#283930]", "text-[#9db9ab]");
    }
  }

  function _resetToolbar() {
    quickDate = null; quickPriority = "medium"; quickTag = "";
    _updateDateBtn(); _updatePriorityBtn(); _updateTagBtn();
  }

  // ── Add task ──
  async function addTask(title, dueDate = null, priority = "medium", tag = "") {
    const v = validateTaskTitle(title);
    if (!v.valid) { showToast(v.error, "warning"); return; }
    const data = { title: title.trim(), dueDate, priority, completed: false, createdAt: new Date().toISOString() };
    if (tag) data.tag = tag;
    await pushUserData("tasks", data);
    showToast("Task added!", "success");
  }

  // "+ New Task" button — single modal instead of 4 sequential prompts
  document.getElementById("new-task-btn")?.addEventListener("click", () => {
    const overlay = document.createElement("div");
    overlay.className = "fixed inset-0 z-[200] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4";
    overlay.innerHTML = `
      <div class="w-full max-w-md bg-[#162b21] rounded-2xl border border-[#3b5447] shadow-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-[#283930] flex items-center justify-between">
          <h3 class="text-white font-bold text-lg flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">add_task</span> New Task
          </h3>
          <button id="ntm-close" class="text-gray-400 hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
          <div class="space-y-2">
            <label class="text-sm font-medium text-[#9db9ab]">Task title <span class="text-red-400">*</span></label>
            <input id="ntm-title" type="text" placeholder="e.g., Submit lab report" class="w-full bg-[#111814] border border-[#3b5447] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" autofocus />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-sm font-medium text-[#9db9ab]">Due date</label>
              <input id="ntm-date" type="date" class="w-full bg-[#111814] border border-[#3b5447] rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all [color-scheme:dark]" />
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-[#9db9ab]">Priority</label>
              <select id="ntm-priority" class="w-full bg-[#111814] border border-[#3b5447] rounded-xl px-4 py-2.5 text-white focus:ring-primary focus:border-primary appearance-none cursor-pointer">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-[#9db9ab]">Tag <span class="text-gray-500 text-xs">(optional)</span></label>
            <input id="ntm-tag" type="text" placeholder="e.g., homework, exam" class="w-full bg-[#111814] border border-[#3b5447] rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" />
          </div>
          <button id="ntm-submit" class="w-full py-3 bg-primary text-[#111814] font-bold rounded-xl hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">add_circle</span> Add Task
          </button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const close = () => overlay.remove();
    document.getElementById("ntm-close").addEventListener("click", close);
    overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
    document.addEventListener("keydown", function esc(e) { if (e.key === "Escape") { close(); document.removeEventListener("keydown", esc); } });
    document.getElementById("ntm-title").focus();

    document.getElementById("ntm-submit").addEventListener("click", async () => {
      const title = document.getElementById("ntm-title").value.trim();
      const dueDate = document.getElementById("ntm-date").value || null;
      const priority = document.getElementById("ntm-priority").value;
      const tag = document.getElementById("ntm-tag").value.trim();
      if (!title) { showToast("Please enter a task title", "warning"); return; }
      await addTask(title, dueDate, priority, tag);
      close();
    });

    // Enter key in title field submits
    document.getElementById("ntm-title").addEventListener("keypress", e => {
      if (e.key === "Enter") { e.preventDefault(); document.getElementById("ntm-submit").click(); }
    });
  });

  // Quick-add bar submit
  document.getElementById("quick-add-btn")?.addEventListener("click", async () => {
    const input = document.getElementById("quick-task-input");
    const title = input?.value.trim();
    if (!title) return;
    await addTask(title, quickDate, quickPriority, quickTag);
    if (input) input.value = "";
    _resetToolbar();
  });

  document.getElementById("quick-task-input")?.addEventListener("keypress", e => {
    if (e.key === "Enter") document.getElementById("quick-add-btn")?.click();
  });
</script>

</body></html>
